# 私有判分用例 —— 不随 problems/ 公开题库发布。
# 与 problems/p001/problem.yaml 通过 id 关联。
id: p001
hidden_cases:
  - name: "SHUF 大数"
    input: |
      SET r0 255
      SET r1 128
      SHUF r2 r0 r1
      HALT
    expected: |
      r0=255
      r1=128
      r2=32511
      r3=0
      r4=0
      r5=0
      r6=0
      r7=0

  - name: "超时检测"
    input: |
      SET r0 1
      LOOP:
      ADD r0 r0
      JMP LOOP
    expected: "TIMEOUT"

  - name: "SCAN 未找到"
    input: |
      SET r1 0
      SET r2 9
      SCAN r0 r1 r2
      HALT
    expected: |
      r0=-1
      r1=0
      r2=9
      r3=0
      r4=0
      r5=0
      r6=0
      r7=0

  - name: "内存读写"
    input: |
      SET r0 42
      SET r1 100
      STORE r0 r1
      SET r0 0
      LOAD r2 r1
      HALT
    expected: |
      r0=0
      r1=100
      r2=42
      r3=0
      r4=0
      r5=0
      r6=0
      r7=0

  - name: "整除与取模"
    input: |
      SET r0 17
      SET r1 5
      MOV r2 r0
      DIV r2 r1
      MOD r0 r1
      HALT
    expected: |
      r0=2
      r1=5
      r2=3
      r3=0
      r4=0
      r5=0
      r6=0
      r7=0
